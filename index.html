<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Toxic Text Detector</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #fff9f5;
  color: #333;
  text-align: center;
  padding: 40px 20px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

textarea {
  width: 90%;
  max-width: 500px;
  height: 120px;
  padding: 10px;
  margin-top: 20px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  background: #c47a6b;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #a96558;
}

.result {
  margin-top: 30px;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
}

.score {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.tags span {
  display: inline-block;
  background: #fdecea;
  color: #c0392b;
  padding: 4px 8px;
  border-radius: 20px;
  margin: 3px;
  font-size: 12px;
}

.block {
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>This is why that text made you feel crazy.</h1>
<p>Paste the message you keep re-reading.</p>

<textarea id="message" placeholder="Type or paste the message..."></textarea>

<br>
<button onclick="analyze()">Analyze This Message</button>

<div class="result" id="result" style="display:none;">
  <div class="score" id="score"></div>
  <div class="tags" id="tags"></div>

  <div class="block">
    <strong>What's happening:</strong>
    <p id="explanation"></p>
  </div>

  <div class="block">
    <strong>Emotional impact:</strong>
    <p id="impact"></p>
  </div>

  <div class="block">
    <strong>Suggested reply:</strong>
    <p id="reply"></p>
  </div>
</div>

<script>
async function analyze() {
  const message = document.getElementById('message').value.trim();

  if (!message) {
    alert("Paste a message first");
    return;
  }

  const resultBox = document.getElementById('result');
  resultBox.style.display = 'block';

  document.getElementById('score').innerText = "Analyzing...";
  document.getElementById('tags').innerHTML = "";
  document.getElementById('explanation').innerText = "";
  document.getElementById('impact').innerText = "";
  document.getElementById('reply').innerText = "";

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || "Erro");
    }

    document.getElementById('score').innerText =
      "Toxic Score: " + Math.round(data.toxicity_score * 100) + "%";

    const tagsContainer = document.getElementById('tags');
    tagsContainer.innerHTML = "";

    (data.detected || []).forEach(tag => {
      const span = document.createElement('span');
      span.innerText = tag;
      tagsContainer.appendChild(span);
    });

    document.getElementById('explanation').innerText = data.explanation;
    document.getElementById('impact').innerText = data.emotional_impact;
    document.getElementById('reply').innerText = data.suggested_reply;

  } catch (err) {
    document.getElementById('score').innerText = "Error analyzing message";
    console.error(err);
  }
}
</script>

</body>
</html>
