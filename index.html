<script>
/* ── Real Messages bar animation ──────────────── */
const realMsgObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.querySelectorAll('.realmsg-mini-fill').forEach(bar => {
        const targetW = bar.style.width;
        bar.style.width = '0%';
        setTimeout(() => { bar.style.width = targetW; }, 150);
      });
      realMsgObserver.unobserve(e.target);
    }
  });
}, { threshold: 0.2 });

const realGrid = document.querySelector('.realmsgs-grid');
if (realGrid) realMsgObserver.observe(realGrid);

/* ── Scroll Reveal ─────────────────────────────── */
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.12 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

/* ── Demo bar animation on scroll ─────────────── */
const demoObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      setTimeout(() => {
        animateScore('demo-score', 'demo-bar', 84, '#d45c4e');
      }, 200);
      demoObserver.unobserve(e.target);
    }
  });
}, { threshold: 0.3 });

const demoSection = document.getElementById('demo-section');
if (demoSection) demoObserver.observe(demoSection);

function animateScore(scoreId, barId, target, color) {
  const scoreEl = document.getElementById(scoreId);
  const barEl = document.getElementById(barId);

  let current = 0;
  const safeTarget = Math.max(0, Math.min(Number(target) || 0, 100));
  const step = safeTarget / 60;

  barEl.style.width = safeTarget + '%';
  barEl.style.background = color
    ? `linear-gradient(90deg, #e8a55c, ${color})`
    : 'linear-gradient(90deg, #e8a55c, #d45c4e)';

  const interval = setInterval(() => {
    current = Math.min(current + step, safeTarget);
    scoreEl.innerHTML = Math.round(current) + '<span>/ 100</span>';
    if (current >= safeTarget) clearInterval(interval);
  }, 16);
}

function getTagClass(label) {
  const lower = String(label).toLowerCase();

  if (
    lower.includes('gaslighting') ||
    lower.includes('manipulation') ||
    lower.includes('emotional manipulation') ||
    lower.includes('narciss')
  ) {
    return 'tag tag-danger';
  }

  if (
    lower.includes('passive') ||
    lower.includes('deflection') ||
    lower.includes('dismiss') ||
    lower.includes('blame') ||
    lower.includes('generalization') ||
    lower.includes('guilt') ||
    lower.includes('warning')
  ) {
    return 'tag tag-warning';
  }

  return 'tag tag-purple';
}

function getTagEmoji(label) {
  const lower = String(label).toLowerCase();

  if (lower.includes('gaslighting')) return '🚨';
  if (lower.includes('manipulation')) return '⚠️';
  if (lower.includes('passive')) return '🪞';
  if (lower.includes('narciss')) return '🪞';
  if (lower.includes('deflection')) return '🔁';
  if (lower.includes('dismiss')) return '🔁';
  if (lower.includes('blame')) return '🔁';

  return '✦';
}

function renderTags(containerId, tags) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  (tags || []).forEach(tagText => {
    const span = document.createElement('span');
    span.className = getTagClass(tagText);
    span.textContent = `${getTagEmoji(tagText)} ${tagText}`;
    container.appendChild(span);
  });
}

function renderApiResult(scoreId, barId, tagsId, expId, impactId, replyId, apiData, showImpact) {
  const adapted = {
    score: apiData?.toxicity_score ?? 0,
    tags: apiData?.detected ?? [],
    explanation: apiData?.explanation ?? 'No explanation returned.',
    impact: apiData?.emotional_impact ?? '',
    reply: apiData?.suggested_reply ?? 'No suggested reply returned.'
  };

  renderTags(tagsId, adapted.tags);
  document.getElementById(expId).textContent = adapted.explanation;

  if (showImpact && impactId) {
    const impactEl = document.getElementById(impactId);
    if (impactEl) impactEl.textContent = adapted.impact;
  }

  document.getElementById(replyId).textContent = adapted.reply;
  document.getElementById(scoreId).innerHTML = '0<span>/ 100</span>';
  document.getElementById(barId).style.width = '0%';

  setTimeout(() => animateScore(scoreId, barId, adapted.score, '#d45c4e'), 100);
}

async function callAnalysisAPI(message) {
  const response = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message })
  });

  const data = await response.json();

  if (!response.ok) {
    throw new Error(data.error || 'Error analyzing message');
  }

  return data;
}

async function analyzeMessage() {
  const textarea = document.getElementById('userMessage');
  const msg = textarea.value.trim();

  if (!msg || msg.length < 5) {
    textarea.style.borderColor = 'var(--deep-rose)';
    textarea.placeholder = 'Please paste a message first…';
    return;
  }

  textarea.style.borderColor = 'var(--rose)';

  const result = document.getElementById('tryit-result');
  result.classList.add('show');
  result.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.getElementById('live-score').innerHTML = 'Analyzing...';
  document.getElementById('live-tags').innerHTML = '';
  document.getElementById('live-explanation').textContent = 'Reading the message...';
  document.getElementById('live-impact').textContent = '';
  document.getElementById('live-reply').textContent = '';

  try {
    const data = await callAnalysisAPI(msg);
    renderApiResult(
      'live-score',
      'live-bar',
      'live-tags',
      'live-explanation',
      'live-impact',
      'live-reply',
      data,
      true
    );
  } catch (err) {
    document.getElementById('live-score').innerHTML = 'Error';
    document.getElementById('live-explanation').textContent = err.message || 'Something went wrong.';
    document.getElementById('live-impact').textContent = '';
    document.getElementById('live-reply').textContent = 'Please try again.';
    console.error(err);
  }
}

async function analyzeModal() {
  const textarea = document.getElementById('modalMessage');
  const msg = textarea.value.trim();

  if (!msg || msg.length < 5) {
    textarea.style.borderColor = 'var(--deep-rose)';
    return;
  }

  textarea.style.borderColor = 'var(--rose)';

  const result = document.getElementById('modal-result');
  result.style.display = 'block';

  document.getElementById('modal-score').innerHTML = 'Analyzing...';
  document.getElementById('modal-tags').innerHTML = '';
  document.getElementById('modal-explanation').textContent = 'Reading the message...';
  document.getElementById('modal-reply').textContent = '';

  try {
    const data = await callAnalysisAPI(msg);
    renderApiResult(
      'modal-score',
      'modal-bar',
      'modal-tags',
      'modal-explanation',
      null,
      'modal-reply',
      data,
      false
    );
  } catch (err) {
    document.getElementById('modal-score').innerHTML = 'Error';
    document.getElementById('modal-explanation').textContent = err.message || 'Something went wrong.';
    document.getElementById('modal-reply').textContent = 'Please try again.';
    console.error(err);
  }
}

/* ── Modal ─────────────────────────────────────── */
function openModal() {
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeOnOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
